name: Restore renoun cache
description: Resolve and restore the renoun filesystem cache for CI jobs
inputs:
  node-version:
    description: Node major version used by the workflow cache key segment
    required: false
    default: '22'
runs:
  using: composite
  steps:
    - name: Resolve renoun cache token
      id: renoun-cache-token
      shell: bash
      run: echo "token=$(node packages/renoun/src/cli/cache-token.ts)" >> "$GITHUB_OUTPUT"

    - name: Restore and save renoun cache
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
      with:
        path: |
          .renoun/cache/fs-cache.sqlite*
          apps/*/.renoun/cache/fs-cache.sqlite*
          examples/*/.renoun/cache/fs-cache.sqlite*
        key: ${{ runner.os }}-node${{ inputs.node-version }}-renoun-cache-${{ steps.renoun-cache-token.outputs.token }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}-${{ github.workflow }}-${{ github.job }}
        restore-keys: |
          ${{ runner.os }}-node${{ inputs.node-version }}-renoun-cache-${{ steps.renoun-cache-token.outputs.token }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}-
          ${{ runner.os }}-node${{ inputs.node-version }}-renoun-cache-${{ steps.renoun-cache-token.outputs.token }}-${{ hashFiles('pnpm-lock.yaml') }}-
